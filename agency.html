<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agency Dashboard — Locum Check-In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #16a34a;
      --red:    #dc2626;
      --orange: #d97706;
      --grey:   #6b7280;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100vh;
    }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed; inset: 0; background: #f9fafb;
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    #auth-overlay.hidden { display: none; }
    .auth-box {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 16px;
      padding: 2rem; width: 100%; max-width: 360px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      display: flex; flex-direction: column; gap: 1rem;
    }
    .auth-box h2 { font-size: 1.2rem; font-weight: 700; }
    .auth-box p  { font-size: 0.875rem; color: #6b7280; }

    /* ── Layout ── */
    header {
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 0 2rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-brand { font-size: 0.875rem; font-weight: 700; color: #111827; }
    .header-sub   { font-size: 0.75rem; color: #9ca3af; margin-left: 0.5rem; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .header-user  { font-size: 0.8rem; color: #6b7280; }
    .signout-btn  { font-size: 0.78rem; color: #9ca3af; cursor: pointer; border: none; background: none; font-family: inherit; }
    .signout-btn:hover { color: #374151; }

    main { padding: 2rem; display: flex; flex-direction: column; gap: 2rem; max-width: 1100px; margin: 0 auto; }

    /* ── Section ── */
    .section-title {
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #9ca3af; margin-bottom: 0.75rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Live grid ── */
    .live-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem;
    }
    .locum-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 1.1rem 1.25rem;
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .locum-card .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.35rem;
    }
    .dot-green  { background: var(--green); }
    .dot-red    { background: var(--red); }
    .dot-grey   { background: #d1d5db; }
    .dot-orange { background: var(--orange); }

    .locum-name { font-size: 0.95rem; font-weight: 600; color: #111827; }
    .locum-site { font-size: 0.8rem; color: #374151; margin-top: 0.1rem; }
    .locum-meta { font-size: 0.75rem; color: #9ca3af; }
    .locum-badge {
      display: inline-flex; align-items: center; font-size: 0.7rem; font-weight: 600;
      padding: 0.2rem 0.5rem; border-radius: 100px;
    }
    .badge-in       { background: #f0fdf4; color: var(--green); }
    .badge-late     { background: #fef2f2; color: var(--red); }
    .badge-upcoming { background: #f3f4f6; color: #6b7280; }
    .badge-complete { background: #eff6ff; color: #2563eb; }

    /* ── Table ── */
    .table-wrap { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      background: #f9fafb; padding: 0.7rem 1rem;
      text-align: left; font-size: 0.72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280;
      border-bottom: 1px solid #e5e7eb;
    }
    tbody td { padding: 0.75rem 1rem; border-bottom: 1px solid #f3f4f6; color: #374151; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }

    .pill {
      display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.5rem;
      border-radius: 100px;
    }
    .pill-in       { background: #f0fdf4; color: #15803d; }
    .pill-complete { background: #eff6ff; color: #1d4ed8; }
    .pill-upcoming { background: #f3f4f6; color: #6b7280; }
    .pill-no_show  { background: #fef2f2; color: #dc2626; }

    /* ── Assign shift modal ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-bg.hidden { display: none; }
    .modal {
      background: #fff; border-radius: 14px; padding: 1.75rem;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    .modal h3 { font-size: 1rem; font-weight: 700; }

    label.field-label { font-size: 0.75rem; color: #6b7280; display: block; margin-bottom: 0.3rem; }
    select, input[type="text"], input[type="datetime-local"] {
      width: 100%; background: #f9fafb; border: 1px solid #d1d5db;
      border-radius: 8px; color: #111827; font-size: 0.875rem;
      padding: 0.55rem 0.75rem; outline: none; font-family: inherit;
      transition: border-color 0.15s;
    }
    select:focus, input:focus { border-color: #6b7280; }

    /* ── Buttons ── */
    .btn {
      padding: 0.6rem 1.1rem; border-radius: 8px; border: none;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: inherit; transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #111827; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #374151; }
    .btn-ghost { background: #f3f4f6; color: #374151; }
    .btn-ghost:hover { background: #e5e7eb; }
    .btn-auth-google    { background: #fff; color: #374151; border: 1px solid #d1d5db; width: 100%; justify-content: center; }
    .btn-auth-microsoft { background: #0078d4; color: #fff; width: 100%; justify-content: center; }

    .empty { text-align: center; padding: 2rem; color: #9ca3af; font-size: 0.875rem; }

    .refresh-btn { font-size: 0.75rem; color: #9ca3af; cursor: pointer; border: none; background: none; font-family: inherit; }
    .refresh-btn:hover { color: #374151; }
    .or-line { display: flex; align-items: center; gap: 0.5rem; color: #d1d5db; font-size: 0.75rem; }
    .or-line::before, .or-line::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
  </style>
</head>
<body>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div class="auth-box">
    <div>
      <div style="font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:#9ca3af">Agency Dashboard</div>
      <h2 style="margin-top:0.4rem">Sign in</h2>
      <p style="margin-top:0.3rem">Sign in to view your agency's live check-ins.</p>
    </div>
    <button class="btn btn-auth-google" onclick="signIn('google')">
      <svg width="15" height="15" viewBox="0 0 48 48"><path fill="#4285F4" d="M47.5 24.6c0-1.6-.1-3.1-.4-4.6H24v8.7h13.2c-.6 3-2.3 5.5-4.8 7.2v6h7.7c4.5-4.2 7.1-10.3 7.1-17.3z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.7-6c-2.1 1.4-4.9 2.3-8.2 2.3-6.3 0-11.6-4.2-13.5-9.9H2.5v6.2C6.5 42.6 14.7 48 24 48z"/><path fill="#FBBC05" d="M10.5 28.6c-.5-1.4-.8-2.9-.8-4.6s.3-3.2.8-4.6v-6.2H2.5C.9 16.4 0 20.1 0 24s.9 7.6 2.5 10.8l8-6.2z"/><path fill="#EA4335" d="M24 9.5c3.5 0 6.7 1.2 9.2 3.6l6.8-6.8C35.9 2.4 30.4 0 24 0 14.7 0 6.5 5.4 2.5 13.2l8 6.2C12.4 13.7 17.7 9.5 24 9.5z"/></svg>
      Continue with Gmail
    </button>
    <div class="or-line">or</div>
    <button class="btn btn-auth-microsoft" onclick="signIn('azure')">
      <svg width="15" height="15" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Continue with Outlook
    </button>
  </div>
</div>

<!-- Header -->
<header>
  <div style="display:flex;align-items:baseline;gap:0.25rem">
    <div class="header-brand">Locum Check-In</div>
    <div class="header-sub">Agency Dashboard</div>
  </div>
  <div class="header-right">
    <div class="header-user" id="header-user"></div>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
    <button class="btn btn-primary" onclick="openAssignModal()">+ Assign Shift</button>
  </div>
</header>

<main>

  <!-- Live view -->
  <div>
    <div class="section-title">
      <span>Live — Today's Shifts</span>
      <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    </div>
    <div class="live-grid" id="live-grid">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- Shift history -->
  <div>
    <div class="section-title">Shift History</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Worker</th>
            <th>Site</th>
            <th>Date</th>
            <th>Clocked In</th>
            <th>Clocked Out</th>
            <th>Duration</th>
            <th>Distance In</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="history-tbody">
          <tr><td colspan="8" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- Assign shift modal -->
<div class="modal-bg hidden" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Assign Shift</h3>
    <div>
      <label class="field-label">Worker</label>
      <select id="modal-worker"><option value="">Loading…</option></select>
    </div>
    <div>
      <label class="field-label">Site</label>
      <select id="modal-site"><option value="">Loading…</option></select>
    </div>
    <div>
      <label class="field-label">Ward / Location detail (optional)</label>
      <input type="text" id="modal-ward" placeholder="e.g. Ward 7, A&E, ICU" />
    </div>
    <div>
      <label class="field-label">Shift start</label>
      <input type="datetime-local" id="modal-start" />
    </div>
    <div>
      <label class="field-label">Shift end</label>
      <input type="datetime-local" id="modal-end" />
    </div>
    <div id="modal-err" style="font-size:0.8rem;color:#dc2626;display:none"></div>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-bg').classList.add('hidden')">Cancel</button>
      <button class="btn btn-primary" id="assign-btn" onclick="assignShift()">Assign</button>
    </div>
  </div>
</div>

<script>
  // Auth lives in batleyGPT (OAuth providers configured there)
  const AUTH_URL = 'https://spndhzwlavoxammqafpn.supabase.co';
  const AUTH_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwbmRoendsYXZveGFtbXFhZnBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjg3NjYsImV4cCI6MjA5MTYwNDc2Nn0.R_jNFKBRakymXKnajZmkY4R0Fw2QnBbcEUPwuIAQQBg';
  const authSb = supabase.createClient(AUTH_URL, AUTH_KEY);

  // Data lives in democheckin
  const DATA_URL = 'https://syugdirgamxvkajbkkfq.supabase.co';
  const DATA_KEY = 'sb_publishable_QnvnZvDIBIKjBQ3EygpZKQ_Q603UgCF';
  const dataSb = supabase.createClient(DATA_URL, DATA_KEY);

  let currentUser = null;
  let allWorkers  = [];
  let allSites    = [];

  // ── Auth ──────────────────────────────────────────────────────────────────
  function signIn(provider) {
    authSb.auth.signInWithOAuth({ provider, options: { redirectTo: 'http://localhost:3000/agency.html' } });
  }

  async function signOut() {
    await authSb.auth.signOut();
    document.getElementById('auth-overlay').classList.remove('hidden');
  }

  authSb.auth.onAuthStateChange(async (_e, session) => {
    currentUser = session?.user ?? null;
    if (currentUser) {
      document.getElementById('auth-overlay').classList.add('hidden');
      const name = currentUser.user_metadata?.full_name || currentUser.email;
      document.getElementById('header-user').textContent = name;
      await loadAll();
    } else {
      document.getElementById('auth-overlay').classList.remove('hidden');
    }
  });

  // ── Load everything ───────────────────────────────────────────────────────
  async function loadAll() {
    await Promise.all([loadLive(), loadHistory(), loadWorkers(), loadSites()]);
  }

  // ── Live view ─────────────────────────────────────────────────────────────
  async function loadLive() {
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    const todayEnd   = new Date(); todayEnd.setHours(23,59,59,999);

    const { data: shifts } = await dataSb.from('shifts')
      .select('*, worker:workers(name, email), site:sites(name), check_ins(*)')
      .gte('scheduled_start', todayStart.toISOString())
      .lte('scheduled_start', todayEnd.toISOString())
      .order('scheduled_start');

    const grid = document.getElementById('live-grid');
    if (!shifts?.length) { grid.innerHTML = '<div class="empty">No shifts scheduled today.</div>'; return; }

    const now = new Date();
    grid.innerHTML = shifts.map(s => {
      const ci = s.check_ins?.find(c => c.clocked_in_at);
      const start = new Date(s.scheduled_start);
      const lateThreshold = new Date(start.getTime() + 30 * 60000);
      const isLate = !ci && now > lateThreshold;

      let badge, dot, meta;
      if (ci && !ci.clocked_out_at) {
        badge = '<span class="locum-badge badge-in">● Clocked in</span>';
        dot = 'dot-green';
        meta = `In since ${fmtTime(new Date(ci.clocked_in_at))} · ${ci.clock_in_distance_m ?? '?'}m from site`;
      } else if (ci && ci.clocked_out_at) {
        badge = '<span class="locum-badge badge-complete">✓ Complete</span>';
        dot = 'dot-grey';
        meta = `${fmtTime(new Date(ci.clocked_in_at))} – ${fmtTime(new Date(ci.clocked_out_at))}`;
      } else if (isLate) {
        badge = '<span class="locum-badge badge-late">⚠ Late / No show</span>';
        dot = 'dot-red';
        meta = `Expected at ${fmtTime(start)}`;
      } else {
        badge = '<span class="locum-badge badge-upcoming">Upcoming</span>';
        dot = 'dot-grey';
        meta = `Starts at ${fmtTime(start)}`;
      }

      return `
        <div class="locum-card">
          ${badge}
          <div class="locum-name"><span class="status-dot ${dot}"></span>${s.worker?.name || s.worker?.email}</div>
          <div class="locum-site">${s.site?.name}</div>
          <div class="locum-meta">${meta}</div>
        </div>`;
    }).join('');
  }

  // ── History table ─────────────────────────────────────────────────────────
  async function loadHistory() {
    const { data: checkIns } = await dataSb.from('check_ins')
      .select('*, worker:workers(name), site:sites(name), shift:shifts(scheduled_start, scheduled_end, status, ward)')
      .order('created_at', { ascending: false })
      .limit(50);

    const tbody = document.getElementById('history-tbody');
    if (!checkIns?.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">No check-ins recorded yet.</td></tr>';
      return;
    }

    tbody.innerHTML = checkIns.map(c => {
      const date = c.clocked_in_at ? new Date(c.clocked_in_at).toLocaleDateString('en-GB') : '—';
      const inT  = c.clocked_in_at  ? fmtTime(new Date(c.clocked_in_at))  : '—';
      const outT = c.clocked_out_at ? fmtTime(new Date(c.clocked_out_at)) : '—';
      const dur  = c.duration_minutes ? `${Math.floor(c.duration_minutes/60)}h ${c.duration_minutes%60}m` : '—';
      const dist = c.clock_in_distance_m != null ? `${c.clock_in_distance_m}m` : '—';
      const status = c.shift?.status || '—';
      const passed = c.clock_in_geofence_passed;

      return `
        <tr>
          <td>${c.worker?.name || '—'}</td>
          <td>${c.site?.name || '—'}${c.shift?.ward ? `<div style="font-size:0.72rem;color:#9ca3af">${c.shift.ward}</div>` : ''}</td>
          <td>${date}</td>
          <td>${inT}</td>
          <td>${outT}</td>
          <td>${dur}</td>
          <td style="color:${passed ? 'var(--green)' : 'var(--orange)'}">${dist} ${passed ? '✓' : '⚠'}</td>
          <td><span class="pill pill-${status}">${status.replace('_',' ')}</span></td>
        </tr>`;
    }).join('');
  }

  // ── Modal helpers ─────────────────────────────────────────────────────────
  async function loadWorkers() {
    const { data } = await dataSb.from('workers').select('id, name, email').order('name');
    allWorkers = data || [];
  }

  async function loadSites() {
    const { data } = await dataSb.from('sites').select('id, name, type').order('name');
    allSites = data || [];
  }

  function openAssignModal() {
    // Populate dropdowns
    document.getElementById('modal-worker').innerHTML =
      `<option value="">Select worker…</option>` +
      allWorkers.map(w => `<option value="${w.id}">${w.name || w.email}</option>`).join('');
    document.getElementById('modal-site').innerHTML =
      `<option value="">Select site…</option>` +
      allSites.map(s => `<option value="${s.id}">[${s.type}] ${s.name}</option>`).join('');

    // Default times: today 08:00–16:00
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('modal-start').value = `${today}T08:00`;
    document.getElementById('modal-end').value   = `${today}T16:00`;
    document.getElementById('modal-ward').value  = '';
    document.getElementById('modal-err').style.display = 'none';

    document.getElementById('modal-bg').classList.remove('hidden');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-bg'))
      document.getElementById('modal-bg').classList.add('hidden');
  }

  async function assignShift() {
    const workerId = document.getElementById('modal-worker').value;
    const siteId   = document.getElementById('modal-site').value;
    const ward     = document.getElementById('modal-ward').value.trim();
    const start    = document.getElementById('modal-start').value;
    const end      = document.getElementById('modal-end').value;
    const errEl    = document.getElementById('modal-err');
    const btn      = document.getElementById('assign-btn');

    errEl.style.display = 'none';
    if (!workerId || !siteId || !start || !end) {
      errEl.textContent = 'Please fill in all required fields.';
      errEl.style.display = 'block'; return;
    }
    if (new Date(end) <= new Date(start)) {
      errEl.textContent = 'End time must be after start time.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true; btn.textContent = 'Saving…';
    const { error } = await dataSb.from('shifts').insert({
      worker_id: workerId, site_id: siteId,
      ward: ward || null,
      scheduled_start: new Date(start).toISOString(),
      scheduled_end: new Date(end).toISOString(),
      status: 'upcoming',
    });

    btn.disabled = false; btn.textContent = 'Assign';
    if (error) {
      errEl.textContent = error.message; errEl.style.display = 'block';
    } else {
      document.getElementById('modal-bg').classList.add('hidden');
      await loadAll();
    }
  }

  // ── Utils ─────────────────────────────────────────────────────────────────
  function fmtTime(d) {
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }
</script>
</body>
</html>
